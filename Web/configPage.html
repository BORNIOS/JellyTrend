<!DOCTYPE html>
<html lang="en">
<head>
    <title>JellyTrend</title>
</head>
<body>
<div id="jellyTrendConfigPage"
     data-role="page"
     data-pluginuniqueid="d3b07384-d9a1-4e2b-8c3f-1234567890ab"
     class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-select,emby-checkbox">

    <div data-role="content">
        <div class="content-primary">

            <div class="verticalSection">
                <div class="sectionTitleContainer flex align-items-center">
                    <h2 class="sectionTitle"><span data-jt="heading">JellyTrend</span></h2>
                </div>
                <p class="jt-intro" style="color:var(--text-color-secondary)" data-jt-html="true" data-jt="intro_html"></p>
            </div>

            <form id="jellyTrendConfigForm" onsubmit="return false;">
                <div class="verticalSection">

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="tmdbApiKey">
                            <span data-jt="lblTmdbApiKey"></span>
                        </label>
                        <input id="tmdbApiKey"
                               type="password"
                               is="emby-input"
                               data-jt-placeholder="phTmdbApiKey" />
                        <div class="fieldDescription" data-jt-html="true" data-jt="descTmdbApiKey_html"></div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="syncIntervalHours">
                            <span data-jt="lblSyncInterval"></span>
                        </label>
                        <input id="syncIntervalHours"
                               type="number"
                               is="emby-input"
                               min="1"
                               max="168"
                               value="24" />
                        <div class="fieldDescription" data-jt-html="true" data-jt="descSyncInterval_html"></div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="maxItems">
                            <span data-jt="lblMaxItems"></span>
                        </label>
                        <input id="maxItems"
                               type="number"
                               is="emby-input"
                               min="5"
                               max="100"
                               value="20" />
                        <div class="fieldDescription" data-jt-html="true" data-jt="descMaxItems_html"></div>
                    </div>

                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input id="enableBannerMode"
                                   type="checkbox"
                                   is="emby-checkbox" />
                            <span data-jt="lblBanner"></span>
                        </label>
                        <div class="fieldDescription checkboxFieldDescription" data-jt-html="true" data-jt="descBanner_html"></div>
                    </div>

                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input id="enableChannel"
                                   type="checkbox"
                                   is="emby-checkbox" />
                            <span data-jt="lblChannel"></span>
                        </label>
                        <div class="fieldDescription checkboxFieldDescription" data-jt-html="true" data-jt="descChannel_html"></div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="tmdbLanguage">
                            <span data-jt="lblTmdbLanguage"></span>
                        </label>
                        <input id="tmdbLanguage"
                               type="text"
                               is="emby-input"
                               data-jt-placeholder="phTmdbLanguage" />
                        <div class="fieldDescription" data-jt-html="true" data-jt="descTmdbLanguage_html"></div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="tmdbRegion">
                            <span data-jt="lblTmdbRegion"></span>
                        </label>
                        <input id="tmdbRegion"
                               type="text"
                               is="emby-input"
                               data-jt-placeholder="phTmdbRegion" />
                        <div class="fieldDescription" data-jt-html="true" data-jt="descTmdbRegion_html"></div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="channelName">
                            <span data-jt="lblChannelName"></span>
                        </label>
                        <input id="channelName"
                               type="text"
                               is="emby-input"
                               data-jt-placeholder="phChannelName" />
                        <div class="fieldDescription" data-jt-html="true" data-jt="descChannelName_html"></div>
                    </div>

                </div>

                <div>
                    <button is="emby-button"
                            type="button"
                            id="jellyTrendSaveBtn"
                            class="raised button-submit block emby-button">
                        <span data-jt="btnSave"></span>
                    </button>
                </div>
                <div id="jtSaveStatus" style="margin-top:.5em;min-height:1.2em;font-size:.9em;"></div>
            </form>

            <div class="verticalSection" style="margin-top:2em">
                <h3 class="sectionTitle"><span data-jt="stSectionTitle"></span></h3>
                <div id="jtStatusInfo" style="margin-bottom:1em;color:var(--text-color-secondary)"></div>
                <button id="jtRunNow" is="emby-button" type="button" class="raised emby-button">
                    <span data-jt="btnRunSync"></span>
                </button>
            </div>

        </div>
    </div>

    <script type="text/javascript">
(function () {
    'use strict';

    var pluginId = 'd3b07384-d9a1-4e2b-8c3f-1234567890ab';
    var state = { wired: false, bootstrapped: false, lastBootstrapAt: 0, retryTimer: null };
    var currentLang = 'en';

    var I18N = {
        en: {
            pageTitle: 'JellyTrend',
            heading: 'JellyTrend',
            intro_html: 'Fetches TMDB trending movies, matches them to your Jellyfin library, and can show a banner carousel on the home screen.',
            lblTmdbApiKey: 'TMDB API key',
            phTmdbApiKey: 'Paste your TMDB v3 API key',
            descTmdbApiKey_html: 'Required. Get a free key at <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">themoviedb.org/settings/api</a>.',
            lblSyncInterval: 'Sync interval (hours)',
            descSyncInterval_html: 'How often to refresh trending data from TMDB (1–168 h).',
            lblMaxItems: 'Max items',
            descMaxItems_html: 'Maximum number of trending movies to keep in the list.',
            lblBanner: 'Enable banner carousel on home',
            descBanner_html: 'When enabled, the JellyTrend script is injected into the web client home page.',
            lblChannel: 'Enable “Trending” channel (all clients)',
            descChannel_html: 'Adds a channel under <strong>Channels</strong> in every client (web, mobile, Roku, Android TV, etc.). Items play from your library files. The list refreshes after each sync.',
            lblTmdbLanguage: 'TMDB language (BCP-47)',
            phTmdbLanguage: 'es-MX',
            descTmdbLanguage_html: 'Language for titles and overviews from TMDB (e.g. <code>es-MX</code>, <code>en-US</code>). Leave empty for TMDB default.',
            lblTmdbRegion: 'TMDB region (ISO 3166-1 alpha-2)',
            phTmdbRegion: 'MX',
            descTmdbRegion_html: 'Country code to bias trending (e.g. <code>MX</code>, <code>US</code>). Leave empty for global trending.',
            lblChannelName: 'Channel display name',
            phChannelName: 'JellyTrend - Trending Now',
            descChannelName_html: 'Name shown under <strong>Channels</strong> in all clients.',
            btnSave: 'Save',
            btnRunSync: 'Run sync now',
            stSectionTitle: 'Status',
            stLoading: 'Loading…',
            stVersion: 'Version',
            stTmdbKey: 'TMDB key set',
            stCached: 'Cached items',
            stLastSync: 'Last sync',
            valYes: 'Yes',
            valNo: 'No',
            valNever: 'Never',
            errLoadCfg: 'Failed to load configuration: ',
            errSave: 'Failed to save: ',
            msgSaved: 'Settings saved.',
            msgSyncOk: 'Sync started.',
            msgSyncErr: 'Could not start sync: ',
            msgSyncNoTask: 'Scheduled task JellyTrendSync was not found.',
            errLoadStatus: 'Could not load status.'
        },
        es: {
            pageTitle: 'JellyTrend',
            heading: 'JellyTrend',
            intro_html: 'Obtiene películas en tendencia desde TMDB, las empareja con tu biblioteca Jellyfin y puede mostrar un carrusel en la página de inicio.',
            lblTmdbApiKey: 'Clave API de TMDB',
            phTmdbApiKey: 'Pega aquí tu clave API v3 de TMDB',
            descTmdbApiKey_html: 'Obligatoria. Consigue una clave gratuita en <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">themoviedb.org/settings/api</a>.',
            lblSyncInterval: 'Intervalo de sincronización (horas)',
            descSyncInterval_html: 'Cada cuánto tiempo se vuelven a pedir las tendencias a TMDB (1–168 h).',
            lblMaxItems: 'Máximo de ítems',
            descMaxItems_html: 'Número máximo de películas en tendencia que se guardan en la lista.',
            lblBanner: 'Activar carrusel en la página de inicio',
            descBanner_html: 'Si está activado, se inyecta el script de JellyTrend en la página de inicio del cliente web.',
            lblChannel: 'Activar canal «Trending» (todos los clientes)',
            descChannel_html: 'Añade un canal en <strong>Canales</strong> visible en todos los clientes (web, móvil, Roku, Android TV, etc.). La reproducción usa los archivos de tu biblioteca. La lista se actualiza tras cada sincronización.',
            lblTmdbLanguage: 'Idioma TMDB (BCP-47)',
            phTmdbLanguage: 'es-MX',
            descTmdbLanguage_html: 'Idioma de títulos y sinopsis devueltos por TMDB (p. ej. <code>es-MX</code>, <code>en-US</code>). Vacío = predeterminado de TMDB.',
            lblTmdbRegion: 'Región TMDB (ISO 3166-1 alpha-2)',
            phTmdbRegion: 'MX',
            descTmdbRegion_html: 'Código de país para orientar el trending (p. ej. <code>MX</code>, <code>US</code>). Vacío = trending global.',
            lblChannelName: 'Nombre del canal',
            phChannelName: 'JellyTrend - Trending Now',
            descChannelName_html: 'Nombre que aparece en <strong>Canales</strong> en todos los clientes.',
            btnSave: 'Guardar',
            btnRunSync: 'Sincronizar ahora',
            stSectionTitle: 'Estado',
            stLoading: 'Cargando…',
            stVersion: 'Versión',
            stTmdbKey: 'Clave TMDB configurada',
            stCached: 'Ítems en caché',
            stLastSync: 'Última sincronización',
            valYes: 'Sí',
            valNo: 'No',
            valNever: 'Nunca',
            errLoadCfg: 'No se pudo cargar la configuración: ',
            errSave: 'No se pudo guardar: ',
            msgSaved: 'Configuración guardada.',
            msgSyncOk: 'Sincronización iniciada.',
            msgSyncErr: 'No se pudo iniciar la sincronización: ',
            msgSyncNoTask: 'No se encontró la tarea programada JellyTrendSync.',
            errLoadStatus: 'No se pudo cargar el estado.'
        }
    };

    function t(key) {
        var pack = I18N[currentLang] || I18N.en;
        return pack[key] || I18N.en[key] || key;
    }

    function applyI18n() {
        var page = findPage();
        if (!page) return;

        page.querySelectorAll('[data-jt]').forEach(function (el) {
            var key = el.getAttribute('data-jt');
            if (!key) return;
            var val = t(key);
            if (el.getAttribute('data-jt-html') === 'true') {
                el.innerHTML = val;
            } else {
                el.textContent = val;
            }
        });

        page.querySelectorAll('[data-jt-placeholder]').forEach(function (el) {
            var pk = el.getAttribute('data-jt-placeholder');
            if (pk) el.setAttribute('placeholder', t(pk));
        });

        try {
            document.title = t('pageTitle');
            var rootLang = currentLang === 'es' ? 'es' : 'en';
            document.documentElement.setAttribute('lang', rootLang);
        } catch (e) { /* ignore */ }
    }

    function detectLangFallback() {
        var htmlLang = '';
        try {
            htmlLang = (document.documentElement.getAttribute('lang') || '').toLowerCase();
        } catch (e0) { /* ignore */ }
        if (htmlLang.indexOf('es') === 0) {
            currentLang = 'es';
            return;
        }
        var nav = '';
        try {
            nav = (navigator.language || '').toLowerCase();
        } catch (e1) { /* ignore */ }
        if (nav.indexOf('es') === 0) {
            currentLang = 'es';
            return;
        }
        currentLang = 'en';
    }

    function refineLangFromServer() {
        var api = getApiClient();
        if (api && typeof api.getCurrentUser === 'function') {
            try {
                var u = api.getCurrentUser();
                var culture = u && u.Configuration && (u.Configuration.Culture || u.Configuration.UICulture);
                if (culture) {
                    var c = String(culture).toLowerCase();
                    currentLang = c.indexOf('es') === 0 ? 'es' : 'en';
                    return Promise.resolve();
                }
            } catch (e2) { /* ignore */ }
        }

        if (!api || typeof api.getCurrentUserId !== 'function') {
            detectLangFallback();
            return Promise.resolve();
        }

        var uid = api.getCurrentUserId();
        if (!uid) {
            detectLangFallback();
            return Promise.resolve();
        }

        var url = typeof api.getUrl === 'function' ? api.getUrl('Users/' + uid) : '/Users/' + encodeURIComponent(uid);
        var token = getAccessToken();
        var headers = token ? { 'Authorization': 'MediaBrowser Token="' + token + '"' } : {};

        return fetch(url, { credentials: 'include', headers: headers })
            .then(function (r) {
                if (!r.ok) throw new Error(String(r.status));
                return r.json();
            })
            .then(function (u) {
                var culture = u && u.Configuration && (u.Configuration.Culture || u.Configuration.UICulture);
                if (culture) {
                    var c = String(culture).toLowerCase();
                    currentLang = c.indexOf('es') === 0 ? 'es' : 'en';
                } else {
                    detectLangFallback();
                }
            })
            .catch(function () {
                detectLangFallback();
            });
    }

    function findPage() {
        var pages = document.querySelectorAll('#jellyTrendConfigPage');
        return pages.length ? pages[pages.length - 1] : null;
    }

    function q(id) {
        var page = findPage();
        return page ? page.querySelector('#' + id) : null;
    }

    function hasDom() {
        return !!(q('jellyTrendConfigForm') && q('jellyTrendSaveBtn') && q('tmdbApiKey'));
    }

    function tryGet(fn) {
        try { return fn(); } catch (_) { return null; }
    }

    function getApiClient() {
        if (typeof ApiClient !== 'undefined' && ApiClient) return ApiClient;
        if (typeof globalThis !== 'undefined' && globalThis.ApiClient) return globalThis.ApiClient;
        var p = tryGet(function () { return window.parent && window.parent.ApiClient ? window.parent.ApiClient : null; });
        if (p) return p;
        var t = tryGet(function () { return window.top && window.top.ApiClient ? window.top.ApiClient : null; });
        return t || null;
    }

    function getDashboard() {
        if (typeof Dashboard !== 'undefined' && Dashboard) return Dashboard;
        if (typeof globalThis !== 'undefined' && globalThis.Dashboard) return globalThis.Dashboard;
        var p = tryGet(function () { return window.parent && window.parent.Dashboard ? window.parent.Dashboard : null; });
        if (p) return p;
        var t = tryGet(function () { return window.top && window.top.Dashboard ? window.top.Dashboard : null; });
        return t || null;
    }

    function getAccessToken() {
        var api = getApiClient();
        if (api && typeof api.accessToken === 'function') {
            var tok = api.accessToken();
            if (tok) return tok;
        }
        if (api && api._serverInfo && api._serverInfo.AccessToken) return api._serverInfo.AccessToken;
        return '';
    }

    function configUrl() {
        var base = '/Plugins/' + encodeURIComponent(pluginId) + '/Configuration';
        var token = getAccessToken();
        return token ? base + '?api_key=' + encodeURIComponent(token) : base;
    }

    function getConfig() {
        var api = getApiClient();
        if (api && typeof api.getPluginConfiguration === 'function') {
            return api.getPluginConfiguration(pluginId);
        }
        return fetch(configUrl(), { method: 'GET', credentials: 'include' })
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            });
    }

    function saveConfig(cfg) {
        var api = getApiClient();
        if (api && typeof api.updatePluginConfiguration === 'function') {
            return api.updatePluginConfiguration(pluginId, cfg);
        }
        return fetch(configUrl(), {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cfg)
        }).then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r;
        });
    }

    function setStatus(msg, isError) {
        var el = q('jtSaveStatus');
        if (!el) return;
        el.textContent = msg;
        el.style.color = isError ? '#f44336' : '#4caf50';
    }

    function load() {
        var dash = getDashboard();
        if (dash && dash.showLoadingMsg) dash.showLoadingMsg();

        getConfig()
            .then(function (cfg) {
                var apiKey = q('tmdbApiKey');
                var interval = q('syncIntervalHours');
                var max = q('maxItems');
                var banner = q('enableBannerMode');
                var channel = q('enableChannel');
                var tmdbLang = q('tmdbLanguage');
                var tmdbRegion = q('tmdbRegion');
                var channelName = q('channelName');

                if (apiKey) apiKey.value = cfg.TmdbApiKey || '';
                if (interval) interval.value = cfg.SyncIntervalHours || 24;
                if (max) max.value = cfg.MaxItems || 20;
                if (banner) banner.checked = cfg.EnableBannerMode !== false;
                if (channel) channel.checked = cfg.EnableChannel !== false;
                if (tmdbLang) tmdbLang.value = cfg.TmdbLanguage || 'es-MX';
                if (tmdbRegion) tmdbRegion.value = cfg.TmdbRegion || 'MX';
                if (channelName) channelName.value = cfg.ChannelName || 'JellyTrend - Trending Now';
            })
            .catch(function (err) {
                setStatus(t('errLoadCfg') + (err && err.message || err), true);
            })
            .finally(function () {
                if (dash && dash.hideLoadingMsg) dash.hideLoadingMsg();
            });
    }

    function save() {
        var dash = getDashboard();
        if (dash && dash.showLoadingMsg) dash.showLoadingMsg();

        getConfig()
            .then(function (cfg) {
                var apiKey = q('tmdbApiKey');
                var interval = q('syncIntervalHours');
                var max = q('maxItems');
                var banner = q('enableBannerMode');
                var channel = q('enableChannel');
                var tmdbLang = q('tmdbLanguage');
                var tmdbRegion = q('tmdbRegion');
                var channelName = q('channelName');

                cfg.TmdbApiKey = apiKey ? apiKey.value : cfg.TmdbApiKey;
                cfg.SyncIntervalHours = interval ? (Number.parseInt(interval.value, 10) || 24) : cfg.SyncIntervalHours;
                cfg.MaxItems = max ? (Number.parseInt(max.value, 10) || 20) : cfg.MaxItems;
                cfg.EnableBannerMode = banner ? banner.checked : cfg.EnableBannerMode;
                cfg.EnableChannel = channel ? channel.checked : cfg.EnableChannel;
                cfg.TmdbLanguage = tmdbLang ? tmdbLang.value.trim() : cfg.TmdbLanguage;
                cfg.TmdbRegion = tmdbRegion ? tmdbRegion.value.trim().toUpperCase() : cfg.TmdbRegion;
                cfg.ChannelName = channelName ? (channelName.value.trim() || 'JellyTrend - Trending Now') : cfg.ChannelName;

                return saveConfig(cfg);
            })
            .then(function (result) {
                var dash2 = getDashboard();
                if (dash2 && dash2.processPluginConfigurationUpdateResult) {
                    dash2.processPluginConfigurationUpdateResult(result);
                } else {
                    setStatus(t('msgSaved'), false);
                }
            })
            .catch(function (err) {
                setStatus(t('errSave') + (err && err.message || err), true);
            })
            .finally(function () {
                if (dash && dash.hideLoadingMsg) dash.hideLoadingMsg();
            });
    }

    function triggerSync() {
        var token = getAccessToken();
        var headers = token ? { 'Authorization': 'MediaBrowser Token="' + token + '"' } : {};

        fetch('/ScheduledTasks', { credentials: 'include', headers: headers })
            .then(function (r) { return r.json(); })
            .then(function (tasks) {
                var task = null;
                for (var i = 0; i < tasks.length; i++) {
                    if (tasks[i].Key === 'JellyTrendSync') {
                        task = tasks[i];
                        break;
                    }
                }
                if (!task) throw new Error(t('msgSyncNoTask'));
                return fetch('/ScheduledTasks/Running/' + task.Id, {
                    method: 'POST',
                    credentials: 'include',
                    headers: headers
                });
            })
            .then(function () {
                setStatus(t('msgSyncOk'), false);
                loadStatus();
            })
            .catch(function (err) {
                setStatus(t('msgSyncErr') + (err && err.message || err), true);
            });
    }

    function loadStatus() {
        var el0 = q('jtStatusInfo');
        if (el0) el0.textContent = t('stLoading');

        var token = getAccessToken();
        fetch('/JellyTrend/Status', {
            credentials: 'include',
            headers: token ? { 'Authorization': 'MediaBrowser Token="' + token + '"' } : {}
        })
            .then(function (r) { return r.json(); })
            .then(function (s) {
                var el = q('jtStatusInfo');
                if (!el) return;
                el.innerHTML =
                    '<table style="border-spacing:.4em 0">' +
                    row('stVersion', s.Version || '—') +
                    row('stTmdbKey', s.TmdbKeyConfigured ? t('valYes') : t('valNo')) +
                    row('stCached', s.CachedItemCount || 0) +
                    row('stLastSync', s.LastUpdated ? new Date(s.LastUpdated).toLocaleString() : t('valNever')) +
                    '</table>';
            })
            .catch(function () {
                var el = q('jtStatusInfo');
                if (el) el.textContent = t('errLoadStatus');
            });
    }

    function row(labelKey, value) {
        return '<tr><td style="opacity:.7;padding-right:.8em">' + t(labelKey) + '</td><td>' + value + '</td></tr>';
    }

    function bindUi() {
        if (state.wired) return;

        var saveBtn = q('jellyTrendSaveBtn');
        var runBtn = q('jtRunNow');

        if (!saveBtn || !runBtn) return;

        saveBtn.addEventListener('click', save);
        runBtn.addEventListener('click', triggerSync);
        state.wired = true;
    }

    function scheduleRetry() {
        if (state.retryTimer) return;
        state.retryTimer = setTimeout(function () {
            state.retryTimer = null;
            bootstrap();
        }, 280);
    }

    function bootstrap() {
        if (!findPage()) { scheduleRetry(); return; }
        if (!hasDom()) { scheduleRetry(); return; }

        var now = Date.now();
        if (state.bootstrapped && (now - state.lastBootstrapAt) < 1200) return;
        state.lastBootstrapAt = now;

        var page = findPage();
        if (page && page.dataset && page.dataset.pluginuniqueid) {
            pluginId = page.dataset.pluginuniqueid;
        }

        refineLangFromServer().then(function () {
            applyI18n();
            bindUi();
            if (!state.bootstrapped) {
                state.bootstrapped = true;
            }
            load();
            loadStatus();
        });
    }

    function bindPageShow() {
        var page = findPage();
        if (!page) { scheduleRetry(); return; }
        if (page.dataset && page.dataset.jtBound === '1') return;
        if (page.dataset) page.dataset.jtBound = '1';

        page.addEventListener('pageshow', function () {
            bootstrap();
        });
    }

    bindPageShow();

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
            bindPageShow();
            bootstrap();
        });
    } else {
        bootstrap();
    }

    globalThis.addEventListener('hashchange', function () {
        if (globalThis.location && globalThis.location.hash &&
            globalThis.location.hash.indexOf('configurationpage') !== -1 &&
            globalThis.location.hash.indexOf('JellyTrend') !== -1) {
            bindPageShow();
            bootstrap();
        }
    });
})();
    </script>
</div>
</body>
</html>
